version: 2

models:
  - name: mart_monthly_sales
    description: Monthly sales mart with revenue, order volume, and customer counts.
    columns:
      - name: month_start_date
        description: First day of the reporting month.
        data_tests:
          - not_null
          - unique
      - name: order_count
        description: Number of orders placed in the month.
        data_tests:
          - not_null
      - name: revenue_incl_freight
        description: Revenue including freight for the month.
        data_tests:
          - not_null

  - name: mart_top_products
    description: Product performance mart with revenue and unit volume by product
      and category.
    columns:
      - name: product_id
        description: Unique product identifier.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: product_category_name_english
        description: Product category translated to English.
        data_tests:
          - not_null
      - name: units_sold
        description: Number of units sold for the product.
        data_tests:
          - not_null
      - name: revenue_incl_freight
        description: Revenue including freight for the product.
        data_tests:
          - not_null

  - name: mart_customer_rfm_raw
    description: Customer-level raw recency, frequency, and monetary metrics.
    columns:
      - name: customer_unique_id
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_unique_id
      - name: recency_days
        data_tests:
          - not_null
      - name: frequency_orders
        data_tests:
          - not_null
      - name: monetary_value
        data_tests:
          - not_null

  - name: mart_customer_rfm_scored
    description: Customer-level RFM scores and segment labels built on top of raw
      RFM metrics.
    columns:
      - name: customer_unique_id
        description: Unique customer identifier across orders.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('mart_customer_rfm_raw')
                field: customer_unique_id
      - name: recency_score
        data_tests:
          - not_null
      - name: frequency_score
        data_tests:
          - not_null
      - name: monetary_score
        data_tests:
          - not_null
      - name: segment_label
        description: RFM segment assigned to the customer.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - champions
                  - loyal_customers
                  - recent_customers
                  - at_risk
                  - hibernating
                  - potential_loyalists

  - name: mart_delivery_performance
    description: State-level delivery mart using delivered orders with complete
      delivery timestamps.
    columns:
      - name: customer_state
        description: Customer state used for delivery aggregation.
        data_tests:
          - not_null
          - unique
      - name: eligible_delivery_order_count
        data_tests:
          - not_null
      - name: on_time_delivery_rate
        description: Share of delivered orders that arrived on or before the estimated date.
        data_tests:
          - not_null

  - name: mart_seller_performance
    description: Seller-level performance mart with revenue, delivery, and review
      quality metrics.
    columns:
      - name: seller_id
        description: Unique seller identifier.
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id
      - name: order_count
        data_tests:
          - not_null
      - name: revenue_incl_freight
        data_tests:
          - not_null
      - name: on_time_delivery_rate
        description: Share of eligible seller orders delivered on time.
        data_tests:
          - not_null
