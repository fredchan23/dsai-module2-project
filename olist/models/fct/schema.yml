version: 2

models:
  - name: fct_orders
    description: Order-grain fact table with core order KPIs and lifecycle timestamps.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_unique_id
      - name: order_date
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: gmv
        data_tests:
          - not_null
      - name: revenue_incl_freight
        data_tests:
          - not_null
      - name: order_count
        data_tests:
          - not_null
