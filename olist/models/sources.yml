version: 2

sources:
  - name: olist_raw
    description: >
      Raw Olist e-commerce tables ingested into Snowflake (OLIST.RAW) from
      BigQuery via GCS Parquet export. These tables are the authoritative raw
      layer and should not be modified by downstream models.
    database: OLIST
    schema: RAW
    tables:
      - name: raw_orders
        description: Order lifecycle records with purchase, approval, and delivery timestamps.
        columns:
          - name: order_id
            quote: true
            data_tests:
              - not_null
              - unique
          - name: customer_id
            quote: true
            data_tests:
              - not_null
          - name: order_status
            quote: true
            data_tests:
              - not_null
          - name: order_purchase_timestamp
            quote: true
            data_tests:
              - not_null

      - name: raw_order_items
        description: Line items within each order with product, seller, and freight amounts.
        columns:
          - name: order_id
            quote: true
            data_tests:
              - not_null
          - name: order_item_id
            quote: true
            data_tests:
              - not_null
          - name: product_id
            quote: true
            data_tests:
              - not_null
          - name: seller_id
            quote: true
            data_tests:
              - not_null

      - name: raw_order_payments
        description: Payment records per order with method and value broken down by sequence.
        columns:
          - name: order_id
            quote: true
            data_tests:
              - not_null
          - name: payment_sequential
            quote: true
            data_tests:
              - not_null
          - name: payment_type
            quote: true
            data_tests:
              - not_null
          - name: payment_value
            quote: true
            data_tests:
              - not_null

      - name: raw_order_reviews
        description: Customer review scores and comments linked to orders.
        columns:
          - name: review_id
            quote: true
            data_tests:
              - not_null
          - name: order_id
            quote: true
            data_tests:
              - not_null
          - name: review_score
            quote: true
            data_tests:
              - not_null

      - name: raw_customers
        description: Customer dimension with unique identity and location attributes.
        columns:
          - name: customer_id
            quote: true
            data_tests:
              - not_null
              - unique
          - name: customer_unique_id
            quote: true
            data_tests:
              - not_null

      - name: raw_products
        description: Product catalog with category and physical dimension attributes.
        columns:
          - name: product_id
            quote: true
            data_tests:
              - not_null
              - unique

      - name: raw_sellers
        description: Seller master data including city and state.
        columns:
          - name: seller_id
            quote: true
            data_tests:
              - not_null
              - unique

      - name: raw_geolocation
        description: Zip prefix geolocation reference with latitude and longitude coordinates.
        columns:
          - name: geolocation_zip_code_prefix
            quote: true
            data_tests:
              - not_null

      - name: raw_category_translation
        description: Translation map from Portuguese product category names to English.
        columns:
          - name: product_category_name
            quote: true
            data_tests:
              - not_null
              - unique
          - name: product_category_name_english
            quote: true
            data_tests:
              - not_null
