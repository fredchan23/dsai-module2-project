name: Sync Docs From dbt Target

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure sync script is executable
        run: chmod +x scripts/sync_docs_from_target.sh

      - name: Sync docs from olist/target
        run: scripts/sync_docs_from_target.sh

      - name: Commit synced docs if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): sync root docs from olist/target"
          file_pattern: docs/**
